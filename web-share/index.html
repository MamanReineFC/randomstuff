      "Feel your heartbeat and the warmth of your palm.",
      "Exhale gently and let your shoulders drop.",
      "Repeat for several breaths.",
      "Ask softly: what does my heart need to hear today?",
    ]},
  { id: 33, cat: "Self-Compassion", mins: 8, title: "Letter to Your Inner Child",
    why: "The younger you who lived through this still needs to hear that they were not to blame, and that they are loved now.",
    steps: [
      "Picture yourself at the age things were hardest.",
      "Write a few lines to them, starting 'Dear little one…'",
      "Tell them it wasn't their fault.",
      "Tell them what they needed to hear then and didn't.",
      "Let them know you're here now, and you've got them.",
    ]},
  { id: 34, cat: "Self-Compassion", mins: 5, title: "Talk to Yourself Like a Friend",
    why: "Most of us are far crueler to ourselves than we'd ever be to someone we love. This practice closes that gap.",
    steps: [
      "Bring to mind something you're being hard on yourself about.",
      "Notice the tone of your inner voice — is it harsh?",
      "Now imagine a dear friend said the exact same thing about themselves.",
      "What would you say to them? Say it out loud.",
      "Offer those same words to yourself.",
    ]},
  { id: 35, cat: "Self-Compassion", mins: 4, title: "Comforting Touch",
    why: "Soothing physical contact releases calming chemistry — a self-soothing tool that's always with you.",
    steps: [
      "Choose what feels right: hand on heart, a hand on your cheek, or a gentle self-hug.",
      "Wrap your arms around yourself, or hug a cushion to your chest.",
      "Feel the warmth and steady pressure.",
      "Breathe slowly and let your body register the comfort.",
      "Offer yourself a kind phrase as you hold.",
    ]},

  // ---------------- RECOVERY ----------------
  { id: 36, cat: "Recovery", mins: 6, title: "Map Your Resilience",
    why: "Trauma narrows attention onto what's wrong. Deliberately naming your strengths rebuilds a fuller, truer picture.",
    steps: [
      "Name one personal strength that's helped you survive.",
      "Name one skill or ability you're glad to have.",
      "Name one person or place that supports you.",
      "Name one thing that gives you meaning or hope.",
      "Notice: these are resources you already carry.",
    ]},
  { id: 37, cat: "Recovery", mins: 5, title: "Safe People",
    why: "Recovery happens in connection. Knowing exactly who your safe people are makes reaching out possible on hard days.",
    steps: [
      "Bring to mind people you feel steadier around.",
      "What makes them feel safe — do they listen, respect limits, stay calm?",
      "Choose one you could reach out to this week.",
      "Decide what you might say or ask for.",
      "Note them in one place, so the list is ready when you need it.",
    ]},
  { id: 38, cat: "Recovery", mins: 4, title: "Three Good Things",
    why: "Training attention toward the good — even small good — gradually counterbalances the brain's trauma-set negativity.",
    steps: [
      "Recall the day so far.",
      "Name one thing, however small, that was okay or pleasant.",
      "Name a second.",
      "Name a third.",
      "For one of them, note your part in making it happen.",
    ]},
  { id: 39, cat: "Recovery", mins: 6, title: "Timeline of Healing",
    why: "When progress feels invisible, a timeline shows how far you've actually come — and that turning points are real.",
    steps: [
      "Think back over your healing so far, not the trauma itself.",
      "Name one moment you got through that you weren't sure you would.",
      "Name one skill or insight you have now that you didn't before.",
      "Name one small step forward from the past year.",
      "Set one gentle intention for the next step.",
    ]},
  { id: 40, cat: "Recovery", mins: 7, title: "Rescript a Nightmare",
    why: "Rehearsing a new, safer ending to a recurring nightmare can, over time, loosen its hold on your sleep.",
    steps: [
      "Briefly note the recurring nightmare and the feeling it leaves.",
      "Choose a new ending that brings safety, resolution, or empowerment.",
      "Rewrite it: add your own strength, a helper, or an escape.",
      "Close your eyes and vividly picture the new version.",
      "Practise it by day. Be patient, and seek support if it stays distressing.",
    ]},
  { id: 41, cat: "Recovery", mins: 8, title: "My Safety Plan",
    why: "A plan made when you're steady is a gift to yourself for when you're not. It keeps care within reach on the hardest days.",
    steps: [
      "Warning signs: what tells you a hard patch is building?",
      "Immediate actions: which grounding or soothing tools help fastest?",
      "Safe people: who can you contact, and how?",
      "Make your space safer: reduce access to anything you might use to harm yourself.",
      "Keep crisis numbers saved in your phone now, before you need them.",
      "If you're ever in danger, contact a crisis line or emergency services — reaching out is strength, not failure.",
    ]},
];

const {useState, useEffect, useMemo} = React;

const DEFAULT_DISCLAIMER = "Self-help exercises — not therapy or medical advice. Move within a comfortable range and skip anything that causes pain or dizziness.\nYour journal is stored only in this browser, on this device.";

const DECKS = {
  cbt: {
    label: "CBT Deck",
    tagline: "One card · one exercise · a few minutes",
    exercises: CBT_EXERCISES,
    scaleLabel: ["Mood before (0 low – 10 high)", "Mood after (0 low – 10 high)"],
    scaleWord: "Mood",
    bg: "#F2F0EB", card: "#FDFCF9", border: "#E3DFD4", ink: "#2B2B28",
    dim: "#8A867C", mid: "#55524A", soft: "#F4F2EC", input: "#F7F5EF",
    colors: {
      "Cognitive Restructuring": "#4E6E8E", "Behavioral Activation": "#7A8450",
      "Exposure & Testing": "#9A6A4F", "Grounding & Emotion": "#5E7F78",
      "Self-Monitoring": "#7A6690",
    },
  },
  somatic: {
    label: "Somatic Deck",
    tagline: "One card · one practice · back into the body",
    exercises: SOMATIC_EXERCISES,
    scaleLabel: ["How settled do you feel? (0 restless – 10 calm)", "And now? (0 restless – 10 calm)"],
    scaleWord: "Settled",
    bg: "#ECEFE8", card: "#FBFCF8", border: "#DDE0D4", ink: "#272B24",
    dim: "#7E7A70", mid: "#4E5147", soft: "#F1F3EA", input: "#F5F7EF",
    colors: {
      "Breathwork": "#5B7C8D", "Body Awareness": "#6E7F5A", "Movement & Release": "#8D6E5B",
      "Sensory Grounding": "#5D8078", "Mindful Attention": "#75688C", "Self-Soothing": "#96707E",
    },
  },
  cptsd: {
    label: "C-PTSD Workbook",
    tagline: "One card · one practice · steady steps through wellness",
    exercises: CPTSD_EXERCISES,
    scaleLabel: ["How settled do you feel? (0 overwhelmed – 10 grounded)", "And now? (0 overwhelmed – 10 grounded)"],
    scaleWord: "Settled",
    disclaimer: "Gentle self-help drawn from trauma and C-PTSD education resources — not therapy or medical advice. Go at your own pace and stop if a practice feels overwhelming. If you're in crisis or thinking of harming yourself, please contact a crisis line or emergency services — reaching out is a sign of strength.\nYour journal is stored only in this browser, on this device.",
    bg: "#EAEEF0", card: "#FBFCFD", border: "#D6DDE0", ink: "#232A2D",
    dim: "#7C848A", mid: "#48525A", soft: "#EDF1F3", input: "#F3F6F7",
    colors: {
      "Understand": "#4F6D7A", "Grounding": "#5D8078", "Flashbacks": "#8D6E5B",
      "Triggers": "#B0894F", "Reframe": "#75688C", "Regulate": "#5B7C8D",
      "Self-Compassion": "#96707E", "Recovery": "#6E8B5A",
    },
  },
};

const storeKey = (id) => "deck-journal-" + id + "-v1";
function fmtDate(iso){ try { return new Date(iso).toLocaleString(undefined,{month:"short",day:"numeric",hour:"numeric",minute:"2-digit"}); } catch(e){ return iso; } }

function BreathPacer({ color }) {
  return (
    <div style={{ display:"flex", flexDirection:"column", alignItems:"center", margin:"6px 0 16px" }}>
      <div className="pacer" aria-hidden style={{ width:72, height:72, borderRadius:"50%", background:color+"22", border:"2px solid "+color }} />
      <div style={{ fontSize:11.5, color:"#7E7A70", marginTop:8, letterSpacing:"0.08em", textTransform:"uppercase" }}>Breathe with the circle</div>
    </div>
  );
}

function App(){
  const [deckId,setDeckId]=useState("cbt");
  const deck=DECKS[deckId]; const t=deck;
  const [view,setView]=useState("deck");
  const [cat,setCat]=useState("All");
  const [current,setCurrent]=useState(null);
  const [done,setDone]=useState({});
  const [note,setNote]=useState("");
  const [before,setBefore]=useState(null);
  const [after,setAfter]=useState(null);
  const [historyIds,setHistoryIds]=useState([]);
  const [entries,setEntries]=useState([]);
  const [saveState,setSaveState]=useState("idle");

  const cats=useMemo(()=>["All",...Array.from(new Set(deck.exercises.map(e=>e.cat)))],[deckId]);
  const pool=useMemo(()=>deck.exercises.filter(e=>cat==="All"||e.cat===cat),[deckId,cat]);

  useEffect(()=>{ try{ const raw=localStorage.getItem(storeKey(deckId)); setEntries(raw?JSON.parse(raw):[]);}catch(e){ setEntries([]); } },[deckId]);

  const switchDeck=(id)=>{ if(id===deckId) return; setDeckId(id); setCat("All"); setCurrent(null); setDone({}); setNote(""); setBefore(null); setAfter(null); setHistoryIds([]); setSaveState("idle"); setView("deck"); };

  const draw=()=>{
    let cand=pool.filter(e=>!historyIds.slice(-Math.min(4,pool.length-1)).includes(e.id));
    if(cand.length===0) cand=pool;
    const pick=cand[Math.floor(Math.random()*cand.length)];
    setCurrent(pick); setDone({}); setNote(""); setBefore(null); setAfter(null); setSaveState("idle");
    setHistoryIds(h=>[...h,pick.id].slice(-10));
  };

  const toggleStep=(i)=>setDone(d=>({...d,[i]:!d[i]}));
  const completed=current?current.steps.filter((_,i)=>done[i]).length:0;
  const allDone=current&&completed===current.steps.length;
  const accent=current?deck.colors[current.cat]:Object.values(deck.colors)[0];
  const delta=(b,a)=>(b==null||a==null)?null:a-b;

  const saveEntry=()=>{
    if(!current) return; setSaveState("saving");
    const entry={ ts:new Date().toISOString(), title:current.title, cat:current.cat, before, after, note:note.trim() };
    const next=[entry,...entries].slice(0,500);
    try{ localStorage.setItem(storeKey(deckId),JSON.stringify(next)); setEntries(next); setSaveState("saved"); }
    catch(e){ setSaveState("error"); }
  };
  const deleteEntry=(ts)=>{ const next=entries.filter(e=>e.ts!==ts); try{ localStorage.setItem(storeKey(deckId),JSON.stringify(next)); setEntries(next);}catch(e){} };

  const Scale=({value,onChange,label})=>(
    <div style={{ marginBottom:10 }}>
      <div style={{ fontSize:12, letterSpacing:"0.1em", textTransform:"uppercase", color:t.dim, marginBottom:6 }}>{label}</div>
      <div style={{ display:"flex", gap:4, flexWrap:"wrap" }}>
        {Array.from({length:11},(_, n)=>(
          <button key={n} onClick={()=>onChange(n)} aria-pressed={value===n}
            style={{ width:34, height:34, borderRadius:8, cursor:"pointer",
              border:"1px solid "+(value===n?accent:t.border), background:value===n?accent:t.card,
              color:value===n?"#fff":t.mid, fontSize:13, fontWeight:600, fontFamily:"inherit" }}>{n}</button>
        ))}
      </div>
    </div>
  );

  return (
    <div style={{ minHeight:"100vh", background:t.bg, fontFamily:"'Avenir Next','Segoe UI',system-ui,sans-serif", color:t.ink, padding:"0 16px 48px" }}>
      <div style={{ maxWidth:640, margin:"0 auto" }}>

        <div style={{ display:"flex", flexWrap:"wrap", justifyContent:"center", gap:8, padding:"26px 0 6px" }}>
          {Object.entries(DECKS).map(([id,d])=>(
            <button key={id} onClick={()=>switchDeck(id)}
              style={{ padding:"8px 16px", borderRadius:999, cursor:"pointer", fontFamily:"inherit", fontSize:14, fontWeight:700,
                background:deckId===id?t.ink:"transparent", color:deckId===id?t.bg:t.mid,
                border:"1px solid "+(deckId===id?t.ink:t.border) }}>{d.label}</button>
          ))}
        </div>

        <header style={{ padding:"14px 0 8px", textAlign:"center" }}>
          <div style={{ fontSize:11, letterSpacing:"0.22em", textTransform:"uppercase", color:t.dim, marginBottom:10 }}>{deck.tagline}</div>
          <h1 style={{ fontFamily:"Georgia,'Times New Roman',serif", fontWeight:500, fontSize:"clamp(28px,6vw,40px)", margin:0, lineHeight:1.15 }}>The {deck.label}</h1>
        </header>

        <div style={{ display:"flex", justifyContent:"center", gap:8, margin:"14px 0 20px" }}>
          {[["deck","Deck"],["journal","Journal"+(entries.length?" · "+entries.length:"")]].map(([k,label])=>(
            <button key={k} onClick={()=>setView(k)}
              style={{ border:"none", borderBottom:"2px solid "+(view===k?t.ink:"transparent"), background:"transparent",
                color:view===k?t.ink:t.dim, padding:"6px 10px", fontSize:15, fontWeight:600, cursor:"pointer", fontFamily:"inherit" }}>{label}</button>
          ))}
        </div>

        {view==="deck" && (
          <React.Fragment>
            <div style={{ display:"flex", flexWrap:"wrap", gap:8, justifyContent:"center", marginBottom:20 }}>
              {cats.map(c=>(
                <button key={c} onClick={()=>setCat(c)}
                  style={{ border:"1px solid "+(cat===c?t.ink:t.border), background:cat===c?t.ink:"transparent",
                    color:cat===c?t.bg:t.mid, borderRadius:999, padding:"7px 14px", fontSize:13, cursor:"pointer", fontFamily:"inherit" }}>{c}</button>
              ))}
            </div>

            <div style={{ textAlign:"center", marginBottom:26 }}>
              <button onClick={draw}
                style={{ background:accent, color:"#fff", border:"none", borderRadius:12, padding:"14px 34px",
                  fontSize:16, fontWeight:600, cursor:"pointer", fontFamily:"inherit", boxShadow:"0 3px 0 rgba(39,43,36,0.25)" }}>
                {current?"Draw another card":"Draw a card"}
              </button>
              <div style={{ fontSize:12, color:t.dim, marginTop:8 }}>{pool.length} cards in this stack</div>
            </div>

            {current && (
              <div style={{ background:t.card, borderRadius:16, border:"1px solid "+t.border, boxShadow:"0 10px 24px rgba(39,43,36,0.08)", overflow:"hidden" }}>
                <div style={{ height:6, background:accent }} />
                <div style={{ padding:"22px 22px 26px" }}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
                    <span style={{ fontSize:11, letterSpacing:"0.14em", textTransform:"uppercase", color:accent, fontWeight:700 }}>{current.cat}</span>
                    <span style={{ fontSize:12, color:t.dim }}>~{current.mins} min</span>
                  </div>
                  <h2 style={{ fontFamily:"Georgia,serif", fontWeight:500, fontSize:26, margin:"0 0 8px", lineHeight:1.2 }}>{current.title}</h2>
                  <p style={{ fontSize:14.5, lineHeight:1.55, color:t.mid, margin:"0 0 16px", fontStyle:"italic" }}>{current.why}</p>
                  {current.breath && <BreathPacer color={accent} />}
                  <Scale value={before} onChange={setBefore} label={deck.scaleLabel[0]} />
                  <div style={{ display:"flex", flexDirection:"column", gap:6, marginTop:14 }}>
                    {current.steps.map((s,i)=>(
                      <button key={i} onClick={()=>toggleStep(i)} aria-pressed={!!done[i]}
                        style={{ display:"flex", gap:12, alignItems:"flex-start", textAlign:"left",
                          background:done[i]?t.soft:"transparent", border:"none", borderRadius:10, padding:"10px", cursor:"pointer", fontFamily:"inherit" }}>
                        <span aria-hidden style={{ flexShrink:0, width:20, height:20, marginTop:1, borderRadius:6,
                          border:"1.5px solid "+(done[i]?accent:t.border), background:done[i]?accent:"transparent",
                          color:"#fff", fontSize:13, lineHeight:"18px", textAlign:"center" }}>{done[i]?"✓":""}</span>
                        <span style={{ fontSize:15, lineHeight:1.5, color:done[i]?t.dim:t.ink, textDecoration:done[i]?"line-through":"none" }}>{s}</span>
                      </button>
                    ))}
                  </div>
                  <div style={{ margin:"14px 0", fontSize:12.5, color:t.dim }}>
                    {allDone?"All steps done — nice work.":completed+" of "+current.steps.length+" steps done"}
                  </div>
                  {allDone && <Scale value={after} onChange={setAfter} label={deck.scaleLabel[1]} />}
                  {before!=null && after!=null && (
                    <div style={{ fontSize:14, padding:"10px 12px", borderRadius:10, background:t.soft, marginBottom:12 }}>
                      {delta(before,after)>0 && (deck.scaleWord+" shifted +"+delta(before,after)+" — worth noting what helped.")}
                      {delta(before,after)===0 && "No shift this time — the practice still counts."}
                      {delta(before,after)<0 && "A dip can happen when attention meets what's really there. Go gently."}
                    </div>
                  )}
                  <label htmlFor="pad" style={{ fontSize:12, letterSpacing:"0.1em", textTransform:"uppercase", color:t.dim }}>Notes (optional)</label>
                  <textarea id="pad" value={note} onChange={e=>setNote(e.target.value)} placeholder="What came up?" rows={4}
                    style={{ width:"100%", boxSizing:"border-box", marginTop:8, background:t.input, border:"1px solid "+t.border,
                      borderRadius:10, padding:12, fontSize:15, lineHeight:1.5, fontFamily:"inherit", color:t.ink, resize:"vertical" }} />
                  <div style={{ display:"flex", alignItems:"center", gap:12, marginTop:12 }}>
                    <button onClick={saveEntry} disabled={saveState==="saving"||saveState==="saved"}
                      style={{ background:saveState==="saved"?t.dim:t.ink, color:t.bg, border:"none", borderRadius:10,
                        padding:"11px 22px", fontSize:14.5, fontWeight:600, cursor:saveState==="saved"?"default":"pointer", fontFamily:"inherit" }}>
                      {saveState==="saving"?"Saving…":saveState==="saved"?"Saved to journal ✓":"Save to journal"}
                    </button>
                    {saveState==="error" && <span style={{ fontSize:13, color:"#94534B" }}>Couldn't save. Try again.</span>}
                  </div>
                </div>
              </div>
            )}

            {!current && (
              <div style={{ textAlign:"center", padding:"40px 20px", border:"1.5px dashed "+t.border, borderRadius:16, color:t.dim, fontSize:15, lineHeight:1.5 }}>
                {deck.exercises.length} cards across {cats.length-1} categories. Filter a category, or draw from the whole deck.
              </div>
            )}
          </React.Fragment>
        )}

        {view==="journal" && (
          <div>
            {entries.length===0 && (
              <div style={{ textAlign:"center", padding:"40px 20px", border:"1.5px dashed "+t.border, borderRadius:16, color:t.dim, fontSize:15 }}>
                Nothing saved yet. Work through a card in the Deck tab and tap "Save to journal".
              </div>
            )}
            {entries.map(e=>{
              const d=delta(e.before,e.after); const c=deck.colors[e.cat]||t.ink;
              return (
                <div key={e.ts} style={{ background:t.card, border:"1px solid "+t.border, borderRadius:14, padding:"16px 18px", marginBottom:12 }}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"baseline", gap:10, flexWrap:"wrap" }}>
                    <div>
                      <span style={{ fontSize:11, letterSpacing:"0.12em", textTransform:"uppercase", color:c, fontWeight:700 }}>{e.cat}</span>
                      <div style={{ fontFamily:"Georgia,serif", fontSize:18, marginTop:2 }}>{e.title}</div>
                    </div>
                    <span style={{ fontSize:12, color:t.dim }}>{fmtDate(e.ts)}</span>
                  </div>
                  {(e.before!=null||e.after!=null) && (
                    <div style={{ fontSize:13.5, color:t.mid, marginTop:8 }}>
                      {deck.scaleWord}: {e.before!=null?e.before:"–"} → {e.after!=null?e.after:"–"}{d!=null?(" ("+(d>0?"+":"")+d+")"):""}
                    </div>
                  )}
                  {e.note && <div style={{ fontSize:14.5, lineHeight:1.55, marginTop:8, whiteSpace:"pre-wrap" }}>{e.note}</div>}
                  <button onClick={()=>deleteEntry(e.ts)}
                    style={{ marginTop:10, background:"transparent", border:"none", color:t.dim, fontSize:12.5, cursor:"pointer", textDecoration:"underline", padding:0, fontFamily:"inherit" }}>Delete entry</button>
                </div>
              );
            })}
          </div>
        )}

        <footer style={{ marginTop:28, fontSize:12, lineHeight:1.6, color:t.dim, textAlign:"center", whiteSpace:"pre-line" }}>
          {deck.disclaimer || DEFAULT_DISCLAIMER}
        </footer>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
